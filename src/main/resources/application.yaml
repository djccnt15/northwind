server:
  shutdown: graceful
spring:
  application.name: northwind
  output.ansi.enabled: always
  profiles:
    active: dev  # TODO. change profile to prod
    group:
      test: test,sql,local
      dev: dev,sql,local
      prod: prod
  jpa.open-in-view: false  # disable OSIV(open session for lazy loading), default is true
  lifecycle.timeout-per-shutdown-phase: 30s  # wait up to 30s for graceful shutdown, default is 30s
  messages:
    basename: messages,errors  # setting for spring boot message source
    encoding: UTF-8
    fallback-to-system-locale: false
logging:
  level:
    root: info
    # org.springframework.security: DEBUG
    com.djccnt15.northwind:
      domain: trace
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID}){magenta} --- [%clr(${spring.application.name:-unknown}){yellow}] [%t] [%X{traceId:-}] %clr(%-40.40logger{39}){cyan} : %m%n%ex"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${PID} --- [${spring.application.name:-unknown}] [%t] [%X{traceId:-}] %-40.40logger{39} : %m%n%ex"
management:
  endpoints.web.exposure.include: "*"
  endpoint:
    health.show-details: always  # default is never, show health details for all users
  info:
    env.enabled: true  # default is false, enable it for testing purpose
    java.enabled: true  # default is false, enable it for testing purpose
    os.enabled: true  # default is false, enable it for testing purpose
    build.enabled: true  # default is false, enable it for testing purpose
    git:
      enabled: true  # default is false, enable it for testing purpose
      mode: full  # default is simple, show full git info for testing purpose
info:
  app: # value for management.info.env endpoints
    name: study_spring
    description: A Spring Boot application for study purpose
    version: 0.0.1
app:
  default-pw: 1234
  login-failure-limit: 6
