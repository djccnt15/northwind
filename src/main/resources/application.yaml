server:
  servlet.session.timeout: 30m  # default: 30m
  # TODO. option for production deploy
#   port: 8080
#   address: 0.0.0.0
spring:
  application.name: northwind
  output.ansi.enabled: always
  profiles.active: dev  # TODO. change profile to prod
  jpa:
    # show-sql: true
    hibernate.ddl-auto: update  # TODO. change to `validate`
    properties.hibernate:
      format_sql: true
      highlight_sql: true
      use_sql_comment: true
      dialect: org.hibernate.dialect.MySQL8Dialect
    # TODO. remove or disable for sql initialize option for production
    defer-datasource-initialization: true  # delays running `data.sql` after create JPA entity tables
  datasource:
    url: jdbc:mysql://localhost:3306/northwind
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: { username }
    password: { password }
  # H2 DB setting
  h2.console:
    enabled: true
    path: /h2-console
  # TODO. remove or disable sql initialize option for production
  sql.init:  # run `schema.sql`, `data.sql`
    mode: always
    platform: h2  # runs `schema-{platform}.sql`, `data-{platform}.sql` if exists
logging:
  level:
    root: info
    # org.springframework.security: DEBUG
    com.djccnt15.northwind:
      domain: trace
  pattern.console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID}){magenta} --- [%15.15t] [%X{traceId:-}] %clr(%-40.40logger{39}){cyan} : %m%n%ex"
springdoc.swagger-ui:
  docExpansion: none
  tagsSorter: alpha
  operationsSorter: alpha
