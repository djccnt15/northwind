spring:
  output.ansi.enabled: always
  profiles.active: test  # dev, test. dev is for using real database, test is for using in-memory database
  messages:
    basename: messages,errors  # setting for spring boot message source
    encoding: UTF-8
    fallback-to-system-locale: false
  jpa:
    # show-sql: true
    properties.hibernate:
      format_sql: true
      highlight_sql: true
      use_sql_comment: true
app:
  defaultPw: 1234
  loginFailureLimit: 6
  remember-me:
    key: northwind-remember-me-key
    tokenValiditySeconds: 1209600  # 14 days
